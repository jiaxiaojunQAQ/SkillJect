# ============================================
# Available Profiles (agent_type + model_provider):
#   claude-claude            - Claude Code + Claude (Anthropic API)
#   claude-gpt               - Claude Code + GPT
#   claude-glm               - Claude Code + GLM
#   claude-minimax           - Claude Code + MiniMax
#   claude-mimo              - Claude Code + Mimo (Anthropic-compatible API)
#   openclaw-claude-openai   - OpenClaw + Claude via OpenAI-compatible proxy
#   openclaw-claude          - OpenClaw + Claude (Anthropic API)
#   openclaw-gpt             - OpenClaw + GPT
#   openclaw-glm             - OpenClaw + GLM
#   openclaw-minimax         - OpenClaw + MiniMax
#
# Current default models:
#   claude-sonnet-4-6, gpt-5-mini, glm-4.7, MiniMax-M2.7
# ============================================

# ============================================
# Inherited Config (from profiles -> base/ + providers/)
# These fields have sensible defaults. Override only if needed.
# ============================================
#
# global.verbose     (bool,   default: false)
# global.log_level   (str,    one of: DEBUG, INFO, WARNING, ERROR, CRITICAL, default: INFO)
#
# adaptive_iteration.max_attempts    (int,  min: 1, default: 5) - skillject only
# adaptive_iteration.stop_on_success (bool, default: true)
#
# execution.retry_failed       (bool, default: true)
# execution.max_retries        (int,  min: 0, default: 3)
# execution.save_detailed_logs (bool, default: true)
# execution.test_timeout       (int,  min: 1, default: 2400 seconds)
# execution.command_timeout    (int,  min: 1, default: 2400 seconds)
#
# sandbox.domain           (str,  default: localhost:18080)
# sandbox.image            (str,  default: claude_code:latest or openclaw:v1)
