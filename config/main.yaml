# Main Configuration Entry Point
#
# This is the ONLY supported top-level runtime config.
# Run with: python run.py [-c config/main.yaml] [OPTIONS]
# CLI options: --max-attempts, --stop-on-success, --skills, --attack-types, --no-retry, -v
#
# Structure:
#   1. Global overrides (generation, dataset, instruction, llm_judge) apply to every
#      execution_plan step unless that step explicitly overrides them.
#   2. execution_plan steps are processed sequentially, each selecting a profile.
#
# Internal config files (profiles/, base/, providers/, strategies/) are composed
# by profiles and should NOT be edited directly.

# ============================================
# LLM-as-Judge Configuration
# Optional. When present, LLM classifies non-attack responses as REJECTED or IGNORED.
# ============================================
#
# Fields:
#   attack_judgment (bool, default: false)
#     true  = LLM evaluates whether the agent executed the malicious injection
#     false = rule-based dual-layer detection (script execution + consequence detection)
#     Note: response classification (REJECTED/IGNORED) always uses LLM regardless of this flag.
#   model       (str, default: gpt-4)
#   api_key_env  (str) - env var NAME for API key (the value lives in .env,
#                        not here; startup fails fast if the variable is unset)
#   base_url_env (str) - env var NAME for base URL (set to switch provider;
#                        falls back to OPENAI_BASE_URL, then the OpenAI default)
#   timeout      (int, default: 180) - request timeout in seconds
#   temperature  (float, default: 0.3) - sampling temperature
#   max_tokens   (int, default: 4096) - max response tokens

llm_judge:
  attack_judgment: false
  model: gpt-5-mini
  api_key_env: JUDGE_LLM_API_KEY
  base_url_env: JUDGE_LLM_BASE_URL
  timeout: 180
  temperature: 0.3

# ============================================
# Generation Configuration (optional global override)
# ============================================
#
# generation.method  (str, required, one of: direct_execution, skillject, template_injection, baseline)
#   direct_execution  - Execute pre-authored instructions with mapped scripts
#   skillject         - LLM-guided fusion of shell payloads into skill content
#   template_injection - Template-based payload generation
#   baseline          - Execute original skill with normal instruction (no attack)
#
# generation.script_mapping_file (str, optional)
#   Path to manifest JSON file. Only used by direct_execution.
#
# generation.script_selection (dict, optional)
#   Control how injection scripts are selected per skill+attack_type pair.
#   mode         (str, one of: auto, mapping, random, default: auto)
#     auto     = strategy-based (direct_execution→mapping, others→random)
#     mapping  = use MappingScriptSelector with skill_name→script mapping
#     random   = use RandomScriptSelector, randomly pick from data/bash_scripts/
#   mapping_file (str, optional, mode=mapping) - path to manifest JSON
#     When mode=mapping and mapping_file not set, defaults to data/skill_inject/manifest.json
#
# generation.attack_types (list[str], optional, subset of:
#   information_disclosure, privilege_escalation, unauthorized_write, backdoor_injection)
#
# generation.skills (list[str], optional)
#   Skill names to target. Default: all skills in dataset.

# Example: direct_execution with custom manifest and filtered attack types
generation:
  method: skillject
  # script_mapping_file: data/skill_inject/manifest_all.json
  attack_types:
    - information_disclosure
#     - backdoor_injection
#     - privilege_escalation
#     - unauthorized_write
dataset: data/skills_sample
instruction: data/instruction/skills_sample

# generation:
#   method: direct_execution
#   script_mapping_file: data/skill_inject/manifest_all.json
#   attack_types:
#     - information_disclosure
#     - backdoor_injection
#     - privilege_escalation
#     - unauthorized_write
# dataset: data/skills_all_injected
# instruction: data/instruction/skills_all_injected

# Active generation config
# generation:
#   method: baseline  # one of: direct_execution, skillject, template_injection, baseline

# dataset (str | dict, optional)
#   String form: dataset name (e.g. "skills_sample") or path (e.g. "data/skills_sample")
#   Dict form: {name: str, base_dir: str, instruction_base_dir: str}
#   Default base_dir: data/{name}
# dataset: data/skills_sample

# instruction (str, optional)
#   Path to instruction directory. Default: data/instruction/{dataset_name}
# instruction: data/instruction/skills_sample

# ============================================
# Execution Plan
# Sequential list of profile steps. Each step runs to completion before the next.
# ============================================
#
# Per-step fields:
#   profile      (str, required) - one of 9 supported profiles (see list below)
#   model        (str, optional) - override model for this step
#   method       (str, optional) - override generation method
#   dataset      (str|dict, optional) - override dataset for this step
#   skills       (list[str], optional) - override skill selection
#   attack_types (list[str], optional) - override attack types

execution_plan:
  # - profile: openclaw-mimo
